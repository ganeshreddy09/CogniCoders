<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen text-white">

<div class="bg-gray-800 p-8 rounded-xl w-96 text-center">
  <h2 class="text-2xl mb-6">Login</h2>

  <button id="googleBtn" class="bg-red-500 w-full py-3 rounded">
    Sign in with Google
  </button>

  <button id="logoutBtn" class="bg-gray-600 w-full py-2 rounded mt-4">
    Logout
  </button>
</div>

<!-- ROLE MODAL -->
<div id="roleModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center">
  <div class="bg-white text-black p-6 rounded-lg w-80">
    
    <h2 class="text-lg mb-4 font-semibold">Select your role</h2>

    <select id="roleSelect" class="w-full p-2 border rounded mb-4">
      <option value="">-- Choose Role --</option>
      <option value="patient">Patient</option>
      <option value="caregiver">Caregiver</option>
      <option value="doctor">Doctor</option>
    </select>

    <button id="continueBtn" class="bg-blue-600 text-white w-full py-2 rounded">
      Continue
    </button>

  </div>
</div>

<script>
const { createClient } = supabase;

const sb = createClient(
  "https://bmybtwrgosqxfvwkytui.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJteWJ0d3Jnb3NxeGZ2d2t5dHVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MDgzNjYsImV4cCI6MjA5MTI4NDM2Nn0.T9gQN6E950yklyLpSxkpCFkNjavi8jaNn4YscHY712w"
);

document.getElementById("googleBtn").onclick = async () => {
  await sb.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: "http://127.0.0.1:5500/role.html"
    }
  });
};
</script>

</body>
</html>
